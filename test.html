<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCare+ — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --blue:       #7d5a44; --blue-dark:  #4a342a; --blue-light: #f5f1ea; --blue-mid:   #b2967d; 
  --accent:     #c59b27; --accent-soft:#fbf7eb; --text:       #3a2a22; --text2:      #735645;
  --text3:      #a88c74; --border:     #eadecf; --bg:         #faf8f5; --r:          16px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Prompt', sans-serif; background: #f0ebdf; color: var(--text);
  min-height: 100vh; display: flex; justify-content: center; align-items: center;
}
.miniapp-frame {
  width: 100%; max-width: 450px; height: 100vh; background: var(--bg);
  display: flex; flex-direction: column; justify-content: center; padding: 32px 20px;
}
@media (min-width: 450px) { .miniapp-frame { height: 850px; border-radius: 24px; border: 4px solid var(--blue-dark); box-shadow: 0 0 32px rgba(74, 52, 42, 0.15); } }
.login-header { text-align: center; margin-bottom: 32px; }
.login-header i { color: var(--blue); font-size: 36px; margin-bottom: 8px; }
.login-header h2 { font-size: 22px; color: var(--blue-dark); }
.login-header h2 span { color: var(--accent); }
.role-selector { display: flex; gap: 8px; background: var(--blue-light); padding: 4px; border-radius: 12px; margin-bottom: 20px; }
.role-btn { flex: 1; padding: 10px; border: none; background: none; border-radius: 8px; font-family: inherit; font-size: 13px; cursor: pointer; color: var(--text3); }
.role-btn.active { background: #fff; color: var(--blue-dark); font-weight: 500; }
.input-box { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 13.5px; background: #fff; outline: none; margin-bottom: 16px; }
.btn-primary { width: 100%; padding: 11px; background: var(--blue-dark); color: #fff; border: none; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
.quick-login-title { font-size: 11.5px; color: var(--text3); text-align: center; margin: 24px 0 10px; }
.quick-login-list { display: flex; flex-direction: column; gap: 8px; }
.quick-btn { width: 100%; padding: 10px; background: #fff; border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 12.5px; text-align: left; padding-left: 16px; cursor: pointer; color: var(--text2); }
.quick-btn:hover { background: var(--blue-light); }
</style>
</head>
<body>

<div class="miniapp-frame">
  <div class="login-header">
    <i class="ti ti-heart-handshake"></i>
    <h2>Medi<span>Care+</span></h2>
    <p style="font-size: 12.5px; color: var(--text3); margin-top:4px;">ระบบบริการสุขภาพดิจิทัลขนาดเล็ก</p>
  </div>

  <div class="role-selector">
    <button class="role-btn active" id="btn-patient" onclick="changeRole('patient')">ผู้รับบริการ (คนไข้)</button>
    <button class="role-btn" id="btn-doctor" onclick="changeRole('doctor')">บุคลากร (แพทย์)</button>
  </div>

  <input class="input-box" id="loginEmail" type="text" placeholder="ระบุชื่อผู้ใช้งานทดสอบ..." />
  <button class="btn-primary" onclick="executeLogin()">เข้าสู่ระบบ</button>

  <div class="quick-login-title">หรือกดเลือกบัญชีสาธิตด้านล่าง</div>
  <div class="quick-login-list">
    <button class="quick-btn" onclick="quickFill('patient','สมใจ ใจดี')"><i class="ti ti-user"></i> คนไข้จำลอง: คุณสมใจ</button>
    <button class="quick-btn" onclick="quickFill('patient','วารี สุขสันต์')"><i class="ti ti-user"></i> คนไข้จำลอง: คุณวารี</button>
    <button class="quick-btn" onclick="quickFill('doctor','นพ.วิชัย สุขสมบูรณ์')"><i class="ti ti-stethoscope"></i> แพทย์จำลอง: นพ.วิชัย</button>
  </div>
</div>

<script>
let currentRole = "patient";

function changeRole(r) {
  currentRole = r;
  document.getElementById("btn-patient").classList.toggle("active", r === "patient");
  document.getElementById("btn-doctor").classList.toggle("active", r === "doctor");
}

function quickFill(role, name) {
  document.getElementById("loginEmail").value = name;
  changeRole(role);
  executeLogin();
}

function executeLogin() {
  const name = document.getElementById("loginEmail").value.trim();
  if (!name) { alert("กรุณากรอกชื่อผู้ใช้"); return; }
  
  // ย้ายหน้าพาสตริงตัวแปรไปด้วย Query Parameter อย่างถูกต้องตามหลักเว็บโมเดิร์น
  window.location.href = `app.html?user=${encodeURIComponent(name)}&role=${currentRole}`;
}
</script>
</body>
</html>
