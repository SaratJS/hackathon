<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSP Hospital Login - Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-zinc-900 flex justify-center items-center min-h-screen font-serif m-0 p-0">

    <div class="w-[380px] h-[800px] bg-[#d2c5b6] relative overflow-hidden flex flex-col items-center">
        
        <div class="w-[130px] h-[30px] bg-[#a89785] rounded-[20px] mt-[15px] mb-[50px]"></div>

        <div class="bg-[#f6f1eb] w-[85%] rounded-[20px] pt-[40px] px-[30px] pb-[30px] shadow-[0px_25px_45px_rgba(89,66,49,0.4)] flex flex-col items-center relative z-10">
            
            <div class="flex flex-col items-center mb-[30px] text-[#4a3628]">
                <svg class="w-[50px] h-[60px] mb-[10px]" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 5 L10 25 L10 65 C10 95 45 115 50 115 C55 115 90 95 90 65 L90 25 Z" fill="none" stroke="#4a3628" stroke-width="4"/>
                    <path d="M50 20 L50 90" stroke="#4a3628" stroke-width="3"/>
                    <path d="M40 35 Q50 25 60 35 T40 55 T60 75" fill="none" stroke="#4a3628" stroke-width="3"/>
                    <text x="30" y="55" font-size="14" font-family="sans-serif" font-weight="bold" fill="#4a3628">S</text>
                    <text x="60" y="55" font-size="14" font-family="sans-serif" font-weight="bold" fill="#4a3628">P</text>
                    <text x="46" y="80" font-size="14" font-family="sans-serif" font-weight="bold" fill="#4a3628">S</text>
                </svg>
                <h1 class="text-[12px] font-bold tracking-[0.5px]">SSP HOSPITAL</h1>
            </div>

            <form class="w-full" id="loginForm">
                <div class="mb-[15px]">
                    <input type="email" placeholder="email" required 
                        class="w-full py-[14px] px-[20px] rounded-full border-none bg-[#b19d8a] text-white text-[15px] outline-none placeholder:text-white/80">
                </div>
                <div class="mb-[15px]">
                    <input type="password" placeholder="password" required 
                        class="w-full py-[14px] px-[20px] rounded-full border-none bg-[#b19d8a] text-white text-[15px] outline-none placeholder:text-white/80">
                </div>
                
                <label class="flex items-center ml-[10px] mb-[25px] cursor-pointer">
                    <input type="checkbox" class="hidden peer">
                    <span class="w-[18px] h-[12px] bg-[#4a3628] rounded-[3px] mr-[8px] inline-block peer-checked:bg-[#b19d8a] transition-colors"></span>
                    <span class="text-[12px] text-[#5c4a3d]">Remember me?</span>
                </label>

                <button type="submit" 
                    class="w-[70%] py-[12px] rounded-full border-none bg-white text-[#4a3628] text-[13px] font-bold cursor-pointer block mx-auto shadow-[0px_8px_15px_rgba(0,0,0,0.05)] transition-transform active:scale-95">
                    LOG IN
                </button>
            </form>
        </div>

        <div class="flex justify-center gap-[15px] mt-[35px] relative z-10">
            <button class="w-[75px] h-[55px] bg-[#f6f1eb] rounded-[15px] flex justify-center items-center text-[30px] text-black shadow-[0px_15px_25px_rgba(89,66,49,0.35)] transition-transform active:scale-95">
                <i class="fa-brands fa-facebook"></i>
            </button>
            <button class="w-[75px] h-[55px] bg-[#f6f1eb] rounded-[15px] flex justify-center items-center text-[30px] text-black shadow-[0px_15px_25px_rgba(89,66,49,0.35)] transition-transform active:scale-95">
                <i class="fa-brands fa-google"></i>
            </button>
            <button class="w-[75px] h-[55px] bg-[#f6f1eb] rounded-[15px] flex justify-center items-center text-[30px] text-black shadow-[0px_15px_25px_rgba(89,66,49,0.35)] transition-transform active:scale-95">
                <i class="fa-brands fa-apple"></i>
            </button>
        </div>

        <div class="mt-[45px] relative z-10">
            <button onclick="alert('Redirecting to Sign up...')"
                class="bg-white py-[14px] px-[28px] rounded-full shadow-[0px_20px_40px_rgba(89,66,49,0.5)] text-[13px] transition-transform active:scale-95">
                <span class="text-[#a89785]">Already a user?</span> 
                <span class="text-[#4a3628] font-bold">Sing up</span>
            </button>
        </div>

    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            alert('Log in button clicked!');
        });
    </script>
</body>
</html>
